version: "3.8"

services:
  web: 
    build: .
    container_name: web_server
    command: gunicorn config.wsgi:application --bind 0.0.0.0:9000
    ports:
      - "9000:9000"
    volumes:
      - .:/usr/app
      - static:/usr/app/static
      - media:/usr/app/media
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      

  # celery_server:
  #   build: .
  #   container_name: celery_server
  #   command: celery -A config worker --loglevel=info
  #   volumes:
  #     - .:/usr/app
  #   env_file:
  #     - .env.prod
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # redis: 
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   container_name: redis_server
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
    
  db:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    container_name: db_server
    env_file:
      - .env.db.prod
    volumes:
      - postgres_data:/var/lib/postgres/data
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=myuser@123
      - POSTGRES_DB=django_db
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
      interval: 30s
      timeout: 10s
      retries: 5
      

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - static:/usr/app/static
      - media:/usr/app/media
    depends_on:
      - web

volumes:
  redis_data:
  postgres_data:
  static:
  media: